name: Ubuntu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        # Explicitly enumerated (not a `backend: [...]` axis crossed against `include:`) —
        # GitHub Actions only cross-products `include:` entries against other matrix axes
        # when they share a key with that axis; since these entries don't set `backend`,
        # a separate `backend:` axis silently collapses to just the last `include` entry
        # merged onto each backend value, dropping the other three compilers entirely.
        include:
          - name: "Ubuntu 22.04 + GCC-10"
            os: ubuntu-22.04
            compiler: gcc
            version: "10"
            backend: vulkan
          - name: "Ubuntu 22.04 + GCC-10"
            os: ubuntu-22.04
            compiler: gcc
            version: "10"
            backend: webgpu
          - name: "Ubuntu 22.04 + GCC-11"
            os: ubuntu-22.04
            compiler: gcc
            version: "11"
            backend: vulkan
          - name: "Ubuntu 22.04 + GCC-11"
            os: ubuntu-22.04
            compiler: gcc
            version: "11"
            backend: webgpu
          - name: "Ubuntu 22.04 + Clang-11"
            os: ubuntu-22.04
            compiler: clang
            version: "11"
            backend: vulkan
          - name: "Ubuntu 22.04 + Clang-11"
            os: ubuntu-22.04
            compiler: clang
            version: "11"
            backend: webgpu
          - name: "Ubuntu 22.04 + Clang-12"
            os: ubuntu-22.04
            compiler: clang
            version: "12"
            backend: vulkan
          - name: "Ubuntu 22.04 + Clang-12"
            os: ubuntu-22.04
            compiler: clang
            version: "12"
            backend: webgpu

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}} (${{ matrix.backend }})

    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true
      - name: Install Dependency
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update && sudo apt-get upgrade && sudo apt-get dist-upgrade
          sudo apt-get install xorg-dev build-essential libgl-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols python3-setuptools xvfb
          if [ "${{ matrix.backend }}" = "vulkan" ]; then
            sudo apt-get install mesa-vulkan-drivers
          fi
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install cmake gcc-${{ matrix.version }} g++-${{ matrix.version }}
          else
            sudo apt-get install cmake clang-${{ matrix.version }} clang++-${{ matrix.version }}
          fi
      - name: Configure Compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=g++-${{ matrix.version }}" >> $GITHUB_ENV
          else
            echo "CC=clang-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=clang++-${{ matrix.version }}" >> $GITHUB_ENV
          fi
      - name: Install Vulkan SDK
        if: matrix.backend == 'vulkan'
        run: |
          UBUNTU_CODENAME="$(lsb_release -cs)"
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO "/etc/apt/sources.list.d/lunarg-vulkan-${UBUNTU_CODENAME}.list" \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${UBUNTU_CODENAME}.list"
          sudo apt-get update -qq
          sudo apt-get install -y vulkan-sdk || {
            echo "NOTE: vulkan-sdk not available for this Ubuntu release via LunarG repo."
            echo "      Falling back to distro Vulkan packages."
            sudo apt-get install -y libvulkan-dev vulkan-tools vulkan-validationlayers-dev
          }
      - name: Execute bootstrap script
        shell: bash
        run: |
          # dawn is only needed for vkm-compiler's optional WGSL output
          # (VKM_COMPILER_ENABLE_WGSL, off by default and unused by CI); skip it
          # to avoid an unnecessary, disk-heavy clone on every job.
          python3 bootstrap.py --skip dawn
      - name: Build and run unit tests (${{ matrix.backend }} backend)
        # The vulkan backend's tests create a real GLFW window, which needs a real X server
        # even for an invisible window; headless runners have no display at all, so xvfb-run
        # provides a virtual framebuffer for it. The webgpu backend runs headlessly in Chrome
        # instead and doesn't need this.
        #
        # Hosted runners have no GPU, so vkCreateInstance would fail against a hardware ICD;
        # mesa-vulkan-drivers installs lavapipe (a software Vulkan implementation), and both
        # VK_DRIVER_FILES (current loader env var) and the legacy VK_ICD_FILENAMES alias point
        # the Vulkan loader at its ICD manifest so it's picked up regardless of loader version.
        run: |
          if [ "${{ matrix.backend }}" = "vulkan" ]; then
            export VK_DRIVER_FILES="$(ls /usr/share/vulkan/icd.d/lvp_icd.*.json | tr '\n' ':')"
            export VK_ICD_FILENAMES="${VK_DRIVER_FILES}"
            xvfb-run -a python3 scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}} --backend ${{ matrix.backend }}
          else
            python3 scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}} --backend ${{ matrix.backend }}
          fi
