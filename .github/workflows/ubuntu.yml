name: Ubuntu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    env:
      build_type: "Release"
      vulkan_sdk: "$GITHUB_WORKSPACE/vulkan_sdk"
      vulkan_version: "1.3.204.1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04 + GCC-10"
            os: ubuntu-22.04
            compiler: gcc
            version: "10"
          - name: "Ubuntu 22.04 + GCC-11"
            os: ubuntu-22.04
            compiler: gcc
            version: "11"
          - name: "Ubuntu 22.04 + Clang-11"
            os: ubuntu-22.04
            compiler: clang
            version: "11"
          - name: "Ubuntu 22.04 + Clang-12"
            os: ubuntu-22.04
            compiler: clang
            version: "12"

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}}

    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true
      - name: Install Dependency
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update && sudo apt-get upgrade && sudo apt-get dist-upgrade
          sudo apt-get install xorg-dev build-essential libgl-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev python3-setuptools
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install cmake gcc-${{ matrix.version }} g++-${{ matrix.version }}
          else
            sudo apt-get install cmake clang-${{ matrix.version }} clang++-${{ matrix.version }}
          fi
      - name: Configure Compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=g++-${{ matrix.version }}" >> $GITHUB_ENV
          else
            echo "CC=clang-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=clang++-${{ matrix.version }}" >> $GITHUB_ENV
          fi
      - name: Configure Vulkan SDK using the downloaded spec
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: ${{ env.vulkan_version }}
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true
      - name: Execute bootstrap script
        shell: bash
        run: |
          python3 bootstrap.py
      - name: Build and run unit tests (Vulkan backend)
        run: python3 scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}}
