name: Ubuntu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        backend: [vulkan, webgpu]
        include:
          - name: "Ubuntu 22.04 + GCC-10"
            os: ubuntu-22.04
            compiler: gcc
            version: "10"
          - name: "Ubuntu 22.04 + GCC-11"
            os: ubuntu-22.04
            compiler: gcc
            version: "11"
          - name: "Ubuntu 22.04 + Clang-11"
            os: ubuntu-22.04
            compiler: clang
            version: "11"
          - name: "Ubuntu 22.04 + Clang-12"
            os: ubuntu-22.04
            compiler: clang
            version: "12"

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}} (${{ matrix.backend }})

    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true
      - name: Install Dependency
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update && sudo apt-get upgrade && sudo apt-get dist-upgrade
          sudo apt-get install xorg-dev build-essential libgl-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxkbcommon-dev libwayland-dev libwayland-bin wayland-protocols python3-setuptools
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install cmake gcc-${{ matrix.version }} g++-${{ matrix.version }}
          else
            sudo apt-get install cmake clang-${{ matrix.version }} clang++-${{ matrix.version }}
          fi
      - name: Configure Compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=g++-${{ matrix.version }}" >> $GITHUB_ENV
          else
            echo "CC=clang-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=clang++-${{ matrix.version }}" >> $GITHUB_ENV
          fi
      - name: Install Vulkan SDK
        if: matrix.backend == 'vulkan'
        run: |
          UBUNTU_CODENAME="$(lsb_release -cs)"
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO "/etc/apt/sources.list.d/lunarg-vulkan-${UBUNTU_CODENAME}.list" \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${UBUNTU_CODENAME}.list"
          sudo apt-get update -qq
          sudo apt-get install -y vulkan-sdk || {
            echo "NOTE: vulkan-sdk not available for this Ubuntu release via LunarG repo."
            echo "      Falling back to distro Vulkan packages."
            sudo apt-get install -y libvulkan-dev vulkan-tools vulkan-validationlayers-dev
          }
      - name: Execute bootstrap script
        shell: bash
        run: |
          python3 bootstrap.py
      - name: Build and run unit tests (${{ matrix.backend }} backend)
        run: python3 scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}} --backend ${{ matrix.backend }}
