name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        backend: [metal, vulkan, webgpu]
        include:
          - name: "macOS 26 + AppleClang"
            os: macos-26

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }} (${{ matrix.backend }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Vulkan SDK (MoltenVK + headers)
        if: matrix.backend == 'vulkan'
        run: |
          brew install molten-vk vulkan-headers vulkan-loader vulkan-tools
          # volk's dlopen("libvulkan.dylib") only searches standard system paths;
          # Homebrew's non-standard prefix (e.g. /opt/homebrew on Apple Silicon)
          # needs to be added explicitly for the loader to be found at runtime.
          echo "DYLD_LIBRARY_PATH=$(brew --prefix)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Execute bootstrap script
        run: python3 bootstrap.py

      - name: Build and run unit tests (${{ matrix.backend }} backend)
        run: python3 scripts/run_tests.py --no-bootstrap --build-type ${{ env.build_type }} --backend ${{ matrix.backend }}
