name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        # Explicitly enumerated per backend (not a separate `backend:` axis crossed
        # against `include:`) — see ubuntu.yml for why that doesn't reliably cross-product.
        include:
          - name: "macOS 26 + AppleClang"
            os: macos-26
            backend: metal
          - name: "macOS 26 + AppleClang"
            os: macos-26
            backend: vulkan
          - name: "macOS 26 + AppleClang"
            os: macos-26
            backend: webgpu

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }} (${{ matrix.backend }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Vulkan SDK (MoltenVK + headers)
        if: matrix.backend == 'vulkan'
        run: |
          brew install molten-vk vulkan-headers vulkan-loader vulkan-tools
          # volk's dlopen("libvulkan.dylib") only searches standard system paths;
          # Homebrew's non-standard prefix (e.g. /opt/homebrew on Apple Silicon)
          # needs to be added explicitly for the loader to be found at runtime.
          echo "DYLD_LIBRARY_PATH=$(brew --prefix)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Execute bootstrap script
        # dawn is only needed for vkm-compiler's optional WGSL output
        # (VKM_COMPILER_ENABLE_WGSL, off by default and unused by CI); skip it
        # to avoid an unnecessary, disk-heavy clone on every job.
        run: python3 bootstrap.py --skip dawn

      - name: Build and run unit tests (${{ matrix.backend }} backend)
        run: python3 scripts/run_tests.py --no-bootstrap --build-type ${{ env.build_type }} --backend ${{ matrix.backend }}
