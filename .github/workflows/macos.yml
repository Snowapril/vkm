name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS 26 + AppleClang"
            os: macos-26
          - name: "macOS 15 Intel (x86_64) + AppleClang"
            os: macos-15-intel
          - name: "macOS 14 (arm64) + AppleClang"
            os: macos-14

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Vulkan SDK (MoltenVK + headers)
        run: brew install molten-vk vulkan-headers vulkan-loader vulkan-tools

      - name: Execute bootstrap script
        run: python3 bootstrap.py

      - name: Build and run unit tests (Metal + Vulkan backends)
        run: python3 scripts/run_tests.py --no-bootstrap --build-type ${{ env.build_type }}
