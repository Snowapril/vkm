name: Window

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-window:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows Server 2022 + Visual Studio 2022"
            os: windows-2022

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}}
    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Install Vulkan SDK
      shell: pwsh
      run: |
        winget install --id KhronosGroup.VulkanSDK --silent --accept-source-agreements --accept-package-agreements
        $vulkanSdk = [System.Environment]::GetEnvironmentVariable("VULKAN_SDK", "Machine")
        if (-not $vulkanSdk) { $vulkanSdk = [System.Environment]::GetEnvironmentVariable("VULKAN_SDK", "User") }
        if ($vulkanSdk) {
          echo "VULKAN_SDK=$vulkanSdk" >> $env:GITHUB_ENV
          echo "$vulkanSdk\Bin" >> $env:GITHUB_PATH
        } else {
          Write-Host "##[warning]VULKAN_SDK env var not found after winget install"
        }
    - name: Execute bootstrap script
      run: |
        python bootstrap.py
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Build and run unit tests (Vulkan backend)
      run: python scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}}
