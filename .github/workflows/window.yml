name: Window

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-window:
    env:
      build_type: "Release"
    strategy:
      fail-fast: false
      matrix:
        backend: [vulkan, webgpu]
        include:
          - name: "Windows Server 2022 + Visual Studio 2022"
            os: windows-2022

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}} (${{ matrix.backend }})
    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Install Vulkan SDK
      if: matrix.backend == 'vulkan'
      shell: pwsh
      run: |
        # GitHub-hosted windows-2022 runners don't ship winget (unlike a real Windows
        # 10/11 dev machine), so download the official LunarG installer directly and run
        # it silently via the Qt Installer Framework CLI flags.
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile "$env:RUNNER_TEMP\vulkan-sdk.exe"
        Start-Process -FilePath "$env:RUNNER_TEMP\vulkan-sdk.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
        $vulkanSdk = [System.Environment]::GetEnvironmentVariable("VULKAN_SDK", "Machine")
        if (-not $vulkanSdk) { $vulkanSdk = [System.Environment]::GetEnvironmentVariable("VULKAN_SDK", "User") }
        if ($vulkanSdk) {
          echo "VULKAN_SDK=$vulkanSdk" >> $env:GITHUB_ENV
          echo "$vulkanSdk\Bin" >> $env:GITHUB_PATH
        } else {
          Write-Host "##[warning]VULKAN_SDK env var not found after installer run"
        }
    - name: Execute bootstrap script
      run: |
        python bootstrap.py
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Build and run unit tests (${{ matrix.backend }} backend)
      run: python scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}} --backend ${{ matrix.backend }}
