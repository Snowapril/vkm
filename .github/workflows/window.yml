name: Window

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-window:
    env:
      build_type: "Release"
      vulkan_sdk: "C:/VulkanSDK"
      vulkan_version: "1.3.204.1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows Server 2022 + Visual Studio 2022"
            os: windows-2022
          - name: "Windows Server 2019 + Visual Studio 2019"
            os: windows-2019

    runs-on: ${{matrix.os}}
    name: ${{matrix.name}}
    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - name: Configure Vulkan SDK using the downloaded spec
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: ${{ env.vulkan_version }}
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true
    - name: Execute bootstrap script
      run: |
        python bootstrap.py
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Build and run unit tests (Vulkan backend)
      run: python scripts/run_tests.py --no-bootstrap --build-type ${{env.build_type}}
